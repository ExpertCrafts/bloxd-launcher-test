<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voxel Modeler</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: #141313;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      padding: 20px;
      gap: 20px;
      background: radial-gradient(circle at top right, #1e1c1c, #141313);
      overflow: hidden;
    }

    .sidebar {
      background: linear-gradient(180deg, #1b1a1a 0%, #191818 100%);
      border: 1px solid #2c2b2b;
      border-radius: 35px;
      padding: 24px 20px;
      width: 280px;
      display: flex;
      flex-direction: column;
      height: 100%;
      flex-shrink: 0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid #2c2b2b;
    }

    .logo h1 {
      font-size: 1.8rem;
      margin: 0;
      background: linear-gradient(45deg, #ff6b39, #ff8c5a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo span {
      color: #a0a0a0;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    .control-group {
      background: linear-gradient(90deg, #262525 0%, #242323 100%);
      border: 1px solid #3a3939;
      padding: 16px 20px;
      border-radius: 18px;
      margin-bottom: 15px;
    }

    .control-group h3 {
      margin: 0 0 12px 0;
      color: #e8e8e8;
      font-size: 1.1rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-group h3 i {
      color: #ff6b39;
    }

    .size-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .size-btn {
      flex: 1;
      background: linear-gradient(145deg, #262525, #212020);
      border: 1px solid #444343;
      border-radius: 12px;
      padding: 10px;
      color: #e8e8e8;
      cursor: pointer;
      text-align: center;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .size-btn:hover {
      border-color: #ff6b39;
      transform: translateY(-2px);
    }

    .size-btn.active {
      background: linear-gradient(90deg, #ff6b39 0%, #ff8c5a 100%);
      border-color: #ff8c5a;
      color: white;
    }

    .color-picker {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
        
    .color-option {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid #3a3939;
      transition: all 0.3s ease;
    }
        
    .color-option:hover {
      transform: scale(1.1);
      border-color: #ff6b39;
    }
        
    .color-option.selected {
      border-color: #ff8c5a;
      box-shadow: 0 0 0 2px #ff6b39;
    }
    
    .add-color-btn {
      background: linear-gradient(90deg, #ff6b39 0%, #ff8c5a 100%);
      border: none;
      border-radius: 12px;
      padding: 12px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .add-color-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 7px 15px rgba(255, 107, 57, 0.4);
    }
    
    .color-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .color-modal.active {
      opacity: 1;
      visibility: visible;
    }
    
    .modal-content {
      background: linear-gradient(180deg, #1b1a1a 0%, #191818 100%);
      border: 1px solid #2c2b2b;
      border-radius: 25px;
      padding: 30px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }
    
    .color-modal.active .modal-content {
      transform: translateY(0);
    }
    
    .modal-header {
      text-align: center;
      margin-bottom: 25px;
    }
    
    .modal-header h2 {
      color: #e8e8e8;
      margin: 0 0 10px 0;
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    .modal-header p {
      color: #a0a0a0;
      margin: 0;
      font-size: 0.9rem;
    }
    
    .color-inputs {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 25px;
    }
    
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .input-group label {
      color: #e8e8e8;
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .color-preview {
      width: 100%;
      height: 60px;
      border-radius: 12px;
      border: 2px solid #3a3939;
      background: linear-gradient(45deg, #ff6b39 0%, #ff8c5a 100%);
      transition: all 0.3s ease;
    }
    
    .hex-input {
      background: linear-gradient(145deg, #262525, #212020);
      border: 1px solid #444343;
      border-radius: 12px;
      padding: 12px 15px;
      color: #e8e8e8;
      font-size: 1rem;
      font-family: monospace;
      text-transform: uppercase;
    }
    
    .hex-input:focus {
      outline: none;
      border-color: #ff6b39;
      box-shadow: 0 0 0 2px rgba(255, 107, 57, 0.2);
    }
    
    .modal-buttons {
      display: flex;
      gap: 15px;
    }
    
    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
    }
    
    .add-btn {
      background: linear-gradient(90deg, #ff6b39 0%, #ff8c5a 100%);
      color: white;
    }
    
    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 15px rgba(255, 107, 57, 0.4);
    }
    
    .cancel-btn {
      background: linear-gradient(145deg, #262525, #212020);
      border: 1px solid #444343;
      color: #e8e8e8;
    }
    
    .cancel-btn:hover {
      border-color: #ff6b39;
      transform: translateY(-2px);
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .tool-btn {
      background: linear-gradient(145deg, #262525, #212020);
      border: 1px solid #444343;
      border-radius: 12px;
      padding: 12px;
      color: #e8e8e8;
      cursor: pointer;
      text-align: center;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .tool-btn:hover {
      border-color: #ff6b39;
      transform: translateY(-2px);
    }

    .tool-btn.active {
      background: linear-gradient(90deg, #ff6b39 0%, #ff8c5a 100%);
      border-color: #ff8c5a;
      color: white;
    }

    .tool-btn i {
      font-size: 1.2rem;
    }

    .export-btn {
      background: linear-gradient(90deg, #ff6b39 0%, #ff8c5a 100%);
      border: none;
      border-radius: 15px;
      padding: 14px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .export-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 7px 15px rgba(255, 107, 57, 0.4);
    }

    .stats {
      background: linear-gradient(90deg, #262525 0%, #242323 100%);
      border: 1px solid #3a3939;
      padding: 12px 16px;
      border-radius: 15px;
      margin-top: auto;
      font-size: 0.9rem;
    }

    .stats div {
      margin: 4px 0;
      display: flex;
      justify-content: space-between;
    }

    .stats span:first-child {
      color: #a0a0a0;
    }

    .stats span:last-child {
      color: #e8e8e8;
      font-weight: 500;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100%;
      overflow: hidden;
    }

    .canvas-container {
      flex: 1;
      background: #111;
      border-radius: 35px;
      border: 1.5px solid #2c2b2b;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      position: relative;
    }

    #voxelCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .instructions {
      background: linear-gradient(180deg, #1b1a1a 0%, #191818 100%);
      border: 1px solid #2c2b2b;
      border-radius: 25px;
      padding: 15px 20px;
      font-size: 0.9rem;
      color: #a0a0a0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .instructions i {
      color: #ff6b39;
      font-size: 1.1rem;
    }
    
    .onscreen-controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(27, 26, 26, 0.8);
      border: 1px solid #3a3939;
      border-radius: 15px;
      padding: 15px;
      backdrop-filter: blur(10px);
      z-index: 100;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      width: 120px;
      height: 120px;
    }
    
    .control-btn {
      background: linear-gradient(145deg, #262525, #212020);
      border: 1px solid #444343;
      border-radius: 8px;
      color: #e8e8e8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      user-select: none;
    }
    
    .control-btn:hover {
      border-color: #ff6b39;
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(255, 107, 57, 0.3);
    }
    
    .control-btn:active {
      transform: translateY(0);
    }
    
    .control-btn.pgup {
      grid-column: 2;
      grid-row: 1;
    }
    
    .control-btn.up {
      grid-column: 2;
      grid-row: 2;
    }
    
    .control-btn.down {
      grid-column: 2;
      grid-row: 3;
    }
    
    .control-btn.left {
      grid-column: 1;
      grid-row: 2;
    }
    
    .control-btn.right {
      grid-column: 3;
      grid-row: 2;
    }
    
    .control-btn.pgdown {
      grid-column: 2;
      grid-row: 3;
    }
    
    .control-label {
      font-size: 10px;
      color: #a0a0a0;
      text-align: center;
      margin-top: 5px;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="logo">
        <h1>Fac3D</h1>
        <span>3D MODELER</span>
      </div>
      
      <div class="control-group">
        <h3><i class="fas fa-th-large"></i> Grid Size</h3>
        <div class="size-selector">
          <div class="size-btn active" data-size="16">16×16</div>
          <div class="size-btn" data-size="8">8×8</div>
        </div>
      </div>
      
      <div class="control-group">
        <h3><i class="fas fa-palette"></i> Colors</h3>
        <div class="color-picker">
          <div class="color-option selected" style="background-color: #ff6b39;" data-color="#ff6b39"></div>
        </div>
        <button class="add-color-btn" id="addColorBtn">
          <i class="fas fa-plus"></i>
          Add Color
        </button>
      </div>
      
      <div class="control-group">
        <h3><i class="fas fa-tools"></i> Tools</h3>
        <div class="tools-grid">
          <div class="tool-btn active" data-tool="paint">
            <i class="fas fa-paint-brush"></i>
            <span>Paint</span>
          </div>
          <div class="tool-btn" data-tool="erase">
            <i class="fas fa-eraser"></i>
            <span>Erase</span>
          </div>
          <div class="tool-btn" data-tool="fill">
            <i class="fas fa-fill"></i>
            <span>Fill</span>
          </div>
          <div class="tool-btn" data-tool="undo">
            <i class="fas fa-undo"></i>
            <span>Undo</span>
          </div>
        </div>
      </div>
      
      <button class="export-btn" id="exportBtn">
        <i class="fas fa-file-export"></i>
        Export GLB
      </button>
      
      <div class="stats">
        <div><span>Voxels:</span> <span id="voxelCount">0</span></div>
        <div><span>Grid Size:</span> <span id="currentSize">16×16</span></div>
        <div><span>Tool:</span> <span id="currentTool">Paint</span></div>
      </div>
    </div>
    
    <div class="main-content">
      <div class="instructions">
        <i class="fas fa-info-circle"></i>
        <span>Arrow keys to move cursor | Space to place voxel | Shift+Space to erase | PgUp/Dn for vertical cursor movement</span>
      </div>
      <div class="canvas-container">
        <canvas id="voxelCanvas"></canvas>
        <div class="onscreen-controls">
          <div class="control-btn pgup" data-action="pgup">⇞</div>
          <div class="control-btn up" data-action="up">↑</div>
          <div class="control-btn pgdown" data-action="pgdown">⇟</div>
          <div class="control-btn left" data-action="left">←</div>
          <div class="control-btn right" data-action="right">→</div>
          <div class="control-btn down" data-action="down">↓</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    class VoxelModeler {
      constructor() {
        this.scene = null;
        this.camera = null;
        this.renderer = null;
        this.controls = null;
        this.voxelGrid = null;
        this.currentColor = '#ff6b39';
        this.currentTool = 'paint';
        this.gridSize = 16;
        this.voxelSize = 1;
        this.voxels = new Map();
        this.raycaster = new THREE.Raycaster();
        this.mouse = new THREE.Vector2();
        
        this.cursorPosition = new THREE.Vector3(0, 0, 0);
        this.cursorMesh = null;
        this.isCursorVisible = true;
        
        this.selectedVoxel = null;
        
        // Undo history
        this.history = [];
        this.maxHistory = 50; // Limit history to prevent memory issues
        
        this.init();
        this.setupEventListeners();
        this.createCursor();
        this.animate();
      }
      
      init() {
        const canvas = document.getElementById('voxelCanvas');
        
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x111111);
        
        this.camera = new THREE.PerspectiveCamera(
          75, 
          canvas.clientWidth / canvas.clientHeight, 
          0.1, 
          1000
        );
        this.camera.position.set(this.gridSize, this.gridSize, this.gridSize);
        
        this.renderer = new THREE.WebGLRenderer({ 
          canvas: canvas, 
          antialias: true 
        });
        this.renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        
        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        this.scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 15);
        this.scene.add(directionalLight);
        
        this.createGridHelper();
        
        window.addEventListener('resize', () => this.onWindowResize());
      }
      
      createGridHelper() {
        if (this.gridHelper) {
          this.scene.remove(this.gridHelper);
        }
        
        const size = this.gridSize;
        const divisions = this.gridSize;
        
        this.gridHelper = new THREE.GridHelper(size, divisions, 0x444444, 0x222222);
        this.gridHelper.position.y = -0.5;
        
        const offset = (this.voxelSize / 2);
        this.gridHelper.position.x = offset;
        this.gridHelper.position.z = offset;
        
        this.scene.add(this.gridHelper);
      }
      
      createCursor() {
        const geometry = new THREE.BoxGeometry(this.voxelSize * 0.9, this.voxelSize * 0.9, this.voxelSize * 0.9);
        const material = new THREE.MeshBasicMaterial({ 
          color: 0xffffff,
          wireframe: true,
          transparent: true,
          opacity: 0.7
        });
        this.cursorMesh = new THREE.Mesh(geometry, material);
        this.cursorMesh.visible = this.isCursorVisible;
        this.scene.add(this.cursorMesh);
        this.updateCursorPosition();
      }
      
      updateCursorPosition() {
        if (this.cursorMesh) {
          this.cursorMesh.position.copy(this.cursorPosition);
          this.cursorMesh.material.color.setStyle(this.currentColor);
        }
      }
      
      setupEventListeners() {
        const canvas = this.renderer.domElement;
        
        document.addEventListener('keydown', (event) => this.onKeyDown(event));
        
        canvas.addEventListener('contextmenu', (event) => event.preventDefault());
        
        document.querySelectorAll('.size-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.changeGridSize(parseInt(btn.dataset.size));
          });
        });
        
        document.querySelectorAll('.color-option').forEach(option => {
          option.addEventListener('click', () => {
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            option.classList.add('selected');
            this.currentColor = option.dataset.color;
            this.updateCursorPosition();
          });
        });
        
        document.getElementById('addColorBtn').addEventListener('click', () => {
          this.openColorModal();
        });
        
        document.querySelectorAll('.tool-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.currentTool = btn.dataset.tool;
            document.getElementById('currentTool').textContent = 
              btn.dataset.tool.charAt(0).toUpperCase() + btn.dataset.tool.slice(1);
          });
        });
        
        document.getElementById('exportBtn').addEventListener('click', () => this.exportModel());
        
        document.querySelectorAll('.control-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const action = btn.dataset.action;
            this.handleControlButton(action);
          });
        });
        
        const confirmBtn = document.getElementById('confirmColorBtn');
        const cancelBtn = document.getElementById('cancelColorBtn');
        const modalColorPicker = document.getElementById('modalColorPicker');
        const hexCodeInput = document.getElementById('hexCodeInput');
        const modal = document.getElementById('colorModal');
        
        confirmBtn.addEventListener('click', () => {
          this.addCustomColorFromModal();
        });
        
        cancelBtn.addEventListener('click', () => {
          this.closeColorModal();
        });
        
        modalColorPicker.addEventListener('input', (e) => {
          const color = e.target.value;
          hexCodeInput.value = color.toUpperCase();
          this.updateColorPreview(color);
        });
        
        hexCodeInput.addEventListener('input', (e) => {
          let value = e.target.value.trim().toUpperCase();
          
          if (value && !value.startsWith('#')) {
            value = '#' + value;
            e.target.value = value;
          }
          
          if (/^#([A-F0-9]{6}|[A-F0-9]{3})$/.test(value)) {
            modalColorPicker.value = value.toLowerCase();
            this.updateColorPreview(value.toLowerCase());
          }
        });
        
        hexCodeInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            this.addCustomColorFromModal();
          }
        });
        
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            this.closeColorModal();
          }
        });
      }
      
      changeGridSize(newSize) {
        this.gridSize = newSize;
        this.voxels.clear();
        this.updateStats();
        this.createGridHelper();
        this.cursorPosition.set(0, 0, 0);
        this.updateCursorPosition();
        this.camera.position.set(newSize, newSize, newSize);
        document.getElementById('currentSize').textContent = `${newSize}×${newSize}`;
      }
      
      onKeyDown(event) {
        const moveAmount = this.voxelSize;
        const halfGrid = this.gridSize / 2 - this.voxelSize / 2;
        
        const cameraForward = new THREE.Vector3();
        const cameraRight = new THREE.Vector3();
        
        this.camera.getWorldDirection(cameraForward);
        cameraForward.y = 0;
        cameraForward.normalize();
        
        cameraRight.crossVectors(cameraForward, new THREE.Vector3(0, 1, 0));
        
        switch(event.key) {
          case 'ArrowUp':
            const forwardStep = cameraForward.clone().multiplyScalar(moveAmount);
            const targetPosForward = this.cursorPosition.clone().add(forwardStep);
            
            const snappedForwardX = Math.round(targetPosForward.x / this.voxelSize) * this.voxelSize;
            const snappedForwardZ = Math.round(targetPosForward.z / this.voxelSize) * this.voxelSize;
            
            if ((snappedForwardX !== this.cursorPosition.x || snappedForwardZ !== this.cursorPosition.z) &&
                Math.abs(snappedForwardX) <= halfGrid && Math.abs(snappedForwardZ) <= halfGrid) {
              this.cursorPosition.x = snappedForwardX;
              this.cursorPosition.z = snappedForwardZ;
            }
            
            event.preventDefault();
            break;
          case 'ArrowDown':
            const backwardStep = cameraForward.clone().multiplyScalar(moveAmount);
            const targetPosBackward = this.cursorPosition.clone().sub(backwardStep);
            
            const snappedBackwardX = Math.round(targetPosBackward.x / this.voxelSize) * this.voxelSize;
            const snappedBackwardZ = Math.round(targetPosBackward.z / this.voxelSize) * this.voxelSize;
            
            if ((snappedBackwardX !== this.cursorPosition.x || snappedBackwardZ !== this.cursorPosition.z) &&
                Math.abs(snappedBackwardX) <= halfGrid && Math.abs(snappedBackwardZ) <= halfGrid) {
              this.cursorPosition.x = snappedBackwardX;
              this.cursorPosition.z = snappedBackwardZ;
            }
            event.preventDefault();
            break;
          case 'ArrowLeft':
            const leftStep = cameraRight.clone().multiplyScalar(moveAmount);
            const targetPosLeft = this.cursorPosition.clone().sub(leftStep);
            
            const snappedLeftX = Math.round(targetPosLeft.x / this.voxelSize) * this.voxelSize;
            const snappedLeftZ = Math.round(targetPosLeft.z / this.voxelSize) * this.voxelSize;
            
            if ((snappedLeftX !== this.cursorPosition.x || snappedLeftZ !== this.cursorPosition.z) &&
                Math.abs(snappedLeftX) <= halfGrid && Math.abs(snappedLeftZ) <= halfGrid) {
              this.cursorPosition.x = snappedLeftX;
              this.cursorPosition.z = snappedLeftZ;
            }
            event.preventDefault();
            break;
          case 'ArrowRight':
            const rightStep = cameraRight.clone().multiplyScalar(moveAmount);
            const targetPosRight = this.cursorPosition.clone().add(rightStep);
            
            const snappedRightX = Math.round(targetPosRight.x / this.voxelSize) * this.voxelSize;
            const snappedRightZ = Math.round(targetPosRight.z / this.voxelSize) * this.voxelSize;
            
            if ((snappedRightX !== this.cursorPosition.x || snappedRightZ !== this.cursorPosition.z) &&
                Math.abs(snappedRightX) <= halfGrid && Math.abs(snappedRightZ) <= halfGrid) {
              this.cursorPosition.x = snappedRightX;
              this.cursorPosition.z = snappedRightZ;
            }
            event.preventDefault();
            break;
          case 'PageUp':
          case 'w':
          case 'W':
            if (this.cursorPosition.y < halfGrid) {
              this.cursorPosition.y += moveAmount;
            }
            event.preventDefault();
            break;
          case 'PageDown':
          case 's':
          case 'S':
            if (this.cursorPosition.y > -halfGrid) {
              this.cursorPosition.y -= moveAmount;
            }
            event.preventDefault();
            break;
          case ' ':
            if (event.shiftKey) {
              this.eraseVoxelAtCursor();
            } else {
              switch(this.currentTool) {
                case 'paint':
                  this.saveState();
                  this.placeVoxelAtCursor();
                  break;
                case 'erase':
                  this.saveState();
                  this.eraseVoxelAtCursor();
                  break;
                case 'fill':
                  this.saveState();
                  this.fillFromCursor();
                  break;
                case 'undo':
                  this.undo();
                  break;
              }
            }
            event.preventDefault();
            break;
          case 'b':
          case 'B':
            this.moveSelectedVoxel(0, moveAmount, 0);
            event.preventDefault();
            break;
          case 'v':
          case 'V':
            this.moveSelectedVoxel(0, -moveAmount, 0);
            event.preventDefault();
            break;
        }
        
        this.updateCursorPosition();
        this.updateCompass();
      }

      placeVoxelAtCursor() {
        const x = this.cursorPosition.x;
        const y = this.cursorPosition.y;
        const z = this.cursorPosition.z;
        const key = `${x},${y},${z}`;
        
        if (this.voxels.has(key)) {
          this.scene.remove(this.voxels.get(key));
          this.voxels.delete(key);
        }
        
        const geometry = new THREE.BoxGeometry(this.voxelSize, this.voxelSize, this.voxelSize);
        const material = new THREE.MeshLambertMaterial({ 
          color: new THREE.Color(this.currentColor) 
        });
        const voxel = new THREE.Mesh(geometry, material);
        
        voxel.position.set(x, y, z);
        voxel.userData = { x, y, z, color: this.currentColor };
        
        this.scene.add(voxel);
        this.voxels.set(key, voxel);
        
        this.updateStats();
      }
      
      eraseVoxelAtCursor() {
        const x = this.cursorPosition.x;
        const y = this.cursorPosition.y;
        const z = this.cursorPosition.z;
        const key = `${x},${y},${z}`;
        
        if (this.voxels.has(key)) {

      fillFromCursor() {
        const x = this.cursorPosition.x;
        const y = this.cursorPosition.y;
        const z = this.cursorPosition.z;
        const key = `${x},${y},${z}`;
        
        // Check if there's a voxel at cursor position
        if (!this.voxels.has(key)) {
          // If no voxel, do normal flood fill with current color
          this.floodFill(x, y, z);
          return;
        }
        
        // Get the clicked voxel
        const clickedVoxel = this.voxels.get(key);
        const targetColor = clickedVoxel.userData.color;
        
        // If clicked voxel is already the current color, do nothing
        if (targetColor === this.currentColor) {
          console.log("Voxel is already the selected color");
          return;
        }
        
        // Find all connected voxels of the same color and replace them
        this.replaceConnectedVoxels(x, y, z, targetColor);
      }
      
      floodFill(startX, startY, startZ) {
        const queue = [[startX, startY, startZ]];
        const visited = new Set();
        
        while (queue.length > 0 && this.voxels.size < this.gridSize * this.gridSize * this.gridSize) {
          const [x, y, z] = queue.shift();
          const key = `${x},${y},${z}`;
          
          if (visited.has(key) || this.voxels.has(key)) continue;
          
          const halfGrid = this.gridSize / 2;
          if (Math.abs(x) > halfGrid || Math.abs(y) > halfGrid || Math.abs(z) > halfGrid) continue;
          
          visited.add(key);
          
          const geometry = new THREE.BoxGeometry(this.voxelSize, this.voxelSize, this.voxelSize);
          const material = new THREE.MeshLambertMaterial({ 
            color: new THREE.Color(this.currentColor) 
          });
          const voxel = new THREE.Mesh(geometry, material);
          
          voxel.position.set(x, y, z);
          voxel.userData = { x, y, z, color: this.currentColor };
          
          this.scene.add(voxel);
          this.voxels.set(key, voxel);
          
          queue.push(
            [x + this.voxelSize, y, z], 
            [x - this.voxelSize, y, z], 
            [x, y + this.voxelSize, z], 
            [x, y - this.voxelSize, z], 
            [x, y, z + this.voxelSize], 
            [x, y, z - this.voxelSize]
          );
        }
        
        this.updateStats();
      }
      
      selectVoxelAtCursor() {
        if (this.selectedVoxel) {
          this.deselectVoxel();
        }
        
        const x = this.cursorPosition.x;
        const y = this.cursorPosition.y;
        const z = this.cursorPosition.z;
        const key = `${x},${y},${z}`;
        
        if (this.voxels.has(key)) {
          this.selectedVoxel = this.voxels.get(key);
          
          if (!this.selectedVoxel.userData.originalColor) {
            this.selectedVoxel.userData.originalColor = this.selectedVoxel.material.color.getHex();
          }
          
          this.selectedVoxel.material.color.setHex(0xffff00);
          this.selectedVoxel.material.emissive.setHex(0x333300);
          
          console.log(`Selected voxel at ${key}`);
        } else {
          this.selectedVoxel = null;
          console.log("No voxel at cursor position");
        }
      }
      
      deselectVoxel() {
        if (this.selectedVoxel) {
          if (this.selectedVoxel.userData.originalColor !== undefined) {
            this.selectedVoxel.material.color.setHex(this.selectedVoxel.userData.originalColor);
            this.selectedVoxel.material.emissive.setHex(0x000000);
          }
          this.selectedVoxel = null;
        }
      }
      
      moveSelectedVoxel(deltaX, deltaY, deltaZ) {
        if (!this.selectedVoxel) {
          console.log("No voxel selected to move");
          return;
        }
        
        const newX = this.selectedVoxel.position.x + deltaX;
        const newY = this.selectedVoxel.position.y + deltaY;
        const newZ = this.selectedVoxel.position.z + deltaZ;
        
        const halfGrid = this.gridSize / 2;
        if (Math.abs(newX) > halfGrid || Math.abs(newY) > halfGrid || Math.abs(newZ) > halfGrid) {
          console.log("Movement would be out of bounds");
          return;
        }
        
        const newKey = `${newX},${newY},${newZ}`;
        if (this.voxels.has(newKey)) {
          console.log("Target position already occupied");
          return;
        }
        
        const oldKey = `${this.selectedVoxel.userData.x},${this.selectedVoxel.userData.y},${this.selectedVoxel.userData.z}`;
        this.voxels.delete(oldKey);
        
        this.selectedVoxel.position.set(newX, newY, newZ);
        this.selectedVoxel.userData.x = newX;
        this.selectedVoxel.userData.y = newY;
        this.selectedVoxel.userData.z = newZ;
        
        this.voxels.set(newKey, this.selectedVoxel);
        
        console.log(`Moved voxel from ${oldKey} to ${newKey}`);
      }

      // Undo system
      saveState() {
        // Save current voxel state
        const state = {
          voxels: new Map(),
          timestamp: Date.now()
        };
        
        // Clone all voxels
        this.voxels.forEach((voxel, key) => {
          const clonedVoxel = voxel.clone();
          clonedVoxel.userData = { ...voxel.userData };
          state.voxels.set(key, clonedVoxel);
        });
        
        // Add to history
        this.history.push(state);
        
        // Limit history size
        if (this.history.length > this.maxHistory) {
          this.history.shift();
        }
      }
      
      undo() {
        if (this.history.length === 0) {
          console.log("Nothing to undo");
          return;
        }
        
        // Get previous state
        const prevState = this.history.pop();
        
        // Clear current voxels
        this.voxels.forEach(voxel => {
          this.scene.remove(voxel);
        });
        this.voxels.clear();
        
        // Restore previous state
        prevState.voxels.forEach((voxel, key) => {
          this.scene.add(voxel);
          this.voxels.set(key, voxel);
        });
        
        this.updateStats();
        console.log(`Undid to state from ${new Date(prevState.timestamp).toLocaleTimeString()}`);
      }

      floodFill(startX, startY, startZ) {
        const queue = [[startX, startY, startZ]];
        const visited = new Set();
        const batchSize = 50;
        let processed = 0;
        
        const processBatch = () => {
          let batchCount = 0;
          
          while (queue.length > 0 && batchCount < batchSize && this.voxels.size < this.gridSize * this.gridSize * this.gridSize) {
            const [x, y, z] = queue.shift();
            const key = `${x},${y},${z}`;
            
            if (visited.has(key) || this.voxels.has(key)) continue;
            
            const halfGrid = this.gridSize / 2;
            if (Math.abs(x) > halfGrid || Math.abs(y) > halfGrid || Math.abs(z) > halfGrid) continue;
            
            visited.add(key);
            
            const geometry = new THREE.BoxGeometry(this.voxelSize, this.voxelSize, this.voxelSize);
            const material = new THREE.MeshLambertMaterial({ 
              color: new THREE.Color(this.currentColor) 
            });
            const voxel = new THREE.Mesh(geometry, material);
            
            voxel.position.set(x, y, z);
            voxel.userData = { x, y, z, color: this.currentColor };
            
            this.scene.add(voxel);
            this.voxels.set(key, voxel);
            
            queue.push(
              [x + this.voxelSize, y, z], 
              [x - this.voxelSize, y, z], 
              [x, y + this.voxelSize, z], 
              [x, y - this.voxelSize, z], 
              [x, y, z + this.voxelSize], 
              [x, y, z - this.voxelSize]
            );
            
            batchCount++;
            processed++;
          }
          
          this.updateStats();
          
          if (queue.length > 0 && processed < 1000) {
            setTimeout(processBatch, 10);
          }
        };
        
        processBatch();
      }
      
      replaceConnectedVoxels(startX, startY, startZ, targetColor) {
        const queue = [[startX, startY, startZ]];
        const visited = new Set();
        const voxelsToReplace = [];
        
        // First pass: find all connected voxels of the target color
        while (queue.length > 0) {
          const [x, y, z] = queue.shift();
          const key = `${x},${y},${z}`;
          
          if (visited.has(key)) continue;
          visited.add(key);
          
          // Check bounds
          const halfGrid = this.gridSize / 2;
          if (Math.abs(x) > halfGrid || Math.abs(y) > halfGrid || Math.abs(z) > halfGrid) continue;
          
          // Check if voxel exists and has target color
          if (this.voxels.has(key)) {
            const voxel = this.voxels.get(key);
            if (voxel.userData.color === targetColor) {
              voxelsToReplace.push({ key, voxel, x, y, z });
              
              // Add neighbors to queue
              queue.push(
                [x + this.voxelSize, y, z],
                [x - this.voxelSize, y, z],
                [x, y + this.voxelSize, z],
                [x, y - this.voxelSize, z],
                [x, y, z + this.voxelSize],
                [x, y, z - this.voxelSize]
              );
            }
          }
        }
        
        // Second pass: replace all found voxels with current color
        voxelsToReplace.forEach(({ key, voxel, x, y, z }) => {
          // Remove old voxel
          this.scene.remove(voxel);
          this.voxels.delete(key);
          
          // Create new voxel with current color
          const geometry = new THREE.BoxGeometry(this.voxelSize, this.voxelSize, this.voxelSize);
          const material = new THREE.MeshLambertMaterial({
            color: new THREE.Color(this.currentColor)
          });
          const newVoxel = new THREE.Mesh(geometry, material);
          
          newVoxel.position.set(x, y, z);
          newVoxel.userData = { x, y, z, color: this.currentColor };
          
          this.scene.add(newVoxel);
          this.voxels.set(key, newVoxel);
        });
        
        this.updateStats();
        console.log(`Replaced ${voxelsToReplace.length} voxels from ${targetColor} to ${this.currentColor}`);
      }

      exportModel() {
        if (this.voxels.size === 0) {
          alert('No voxels to export!');
          return;
        }
        
        console.log(`Starting export of ${this.voxels.size} voxels`);
        
        // Create a fresh group for export
        const exportGroup = new THREE.Group();
        
        // Counter for successful exports
        let successfulExports = 0;
        let failedExports = 0;
        
        // Iterate through all voxels in the map
        this.voxels.forEach((originalVoxel, key) => {
          try {
            // Create a completely new voxel instead of cloning
            const geometry = new THREE.BoxGeometry(
              this.voxelSize,
              this.voxelSize,
              this.voxelSize
            );
            
            // Create new material with the same color
            const material = new THREE.MeshLambertMaterial({
              color: originalVoxel.material.color
            });
            
            const newVoxel = new THREE.Mesh(geometry, material);
            
            // Copy position
            newVoxel.position.copy(originalVoxel.position);
            
            // Copy rotation if it exists
            if (originalVoxel.rotation) {
              newVoxel.rotation.copy(originalVoxel.rotation);
            }
            
            // Copy scale if it exists
            if (originalVoxel.scale) {
              newVoxel.scale.copy(originalVoxel.scale);
            }
            
            // Add to export group
            exportGroup.add(newVoxel);
            successfulExports++;
            
            console.log(`Exported voxel at ${key}: position=${newVoxel.position.toArray()}`);
            
          } catch (error) {
            console.error(`Failed to export voxel ${key}:`, error);
            failedExports++;
          }
        });
        
        console.log(`Export preparation complete:`);
        console.log(`  Successful: ${successfulExports}`);
        console.log(`  Failed: ${failedExports}`);
        console.log(`  Total in map: ${this.voxels.size}`);
        console.log(`  Export group children: ${exportGroup.children.length}`);
        
        if (exportGroup.children.length === 0) {
          alert('Error: No voxels could be prepared for export!');
          return;
        }
        
        if (failedExports > 0) {
          console.warn(`${failedExports} voxels failed to export`);
        }
        
        // Use GLTF exporter
        const exporter = new THREE.GLTFExporter();
        
        exporter.parse(exportGroup, (result) => {
          try {
            // Create blob and download
            const blob = new Blob([result], { type: 'model/gltf-binary' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `voxel-model-${Date.now()}.glb`;
            
            // Add to DOM, click, then remove
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            // Clean up
            URL.revokeObjectURL(url);
            
            console.log('Export completed successfully!');
            alert(`Export successful! Exported ${exportGroup.children.length} voxels.`);
            
          } catch (error) {
            console.error('Export failed:', error);
            alert('Export failed: ' + error.message);
          }
        }, { 
          binary: true,
          onlyVisible: false,
          truncateDrawRange: false,
          embedImages: true
        });
      }
      
      onWindowResize() {
        const canvas = this.renderer.domElement;
        const container = canvas.parentElement;
        
        this.camera.aspect = container.clientWidth / container.clientHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(container.clientWidth, container.clientHeight);
      }
      
      animate() {
        requestAnimationFrame(() => this.animate());
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
      }
    }
    
    window.addEventListener('load', () => {
      new VoxelModeler();
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.parent.postMessage({ action: 'closeIframe' }, '*');
      }
    });
  </script>
  
  <div class="color-modal" id="colorModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add New Color</h2>
        <p>Choose a color for your voxel palette</p>
      </div>
      
      <div class="color-inputs">
        <div class="input-group">
          <label for="modalColorPicker">Color Picker</label>
          <input type="color" id="modalColorPicker" class="color-preview" value="#ff6b39">
        </div>
        
        <div class="input-group">
          <label for="hexCodeInput">Hex Code</label>
          <input type="text" id="hexCodeInput" class="hex-input" placeholder="#FF6B39" maxlength="7">
        </div>
      </div>
      
      <div class="modal-buttons">
        <button class="modal-btn cancel-btn" id="cancelColorBtn">Cancel</button>
        <button class="modal-btn add-btn" id="confirmColorBtn">
          <i class="fas fa-plus"></i> Add Color
        </button>
      </div>
    </div>
  </div>
</body>
</html>
