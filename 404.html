<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Facet/Bloxd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #141313;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: radial-gradient(circle at center, #1e1c1c, #141313);
            text-align: center;
            position: relative;
        }

        .error-content {
            background: linear-gradient(180deg, #1b1a1a 0%, #191818 100%);
            border: 1px solid #2c2b2b;
            border-radius: 35px;
            padding: 50px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(45deg, #ff6b39, #ff8c5a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            text-shadow: 0 5px 15px rgba(255, 107, 57, 0.3);
        }

        .error-title {
            font-size: 2.5rem;
            margin: 20px 0 15px 0;
            color: #e8e8e8;
            font-weight: 600;
        }

        .error-message {
            font-size: 1.2rem;
            color: #c0c0c0;
            margin: 20px 0 30px 0;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            background: linear-gradient(145deg, #262525, #212020);
            border: 1px solid #444343;
            border-radius: 18px;
            padding: 15px 30px;
            color: #e8e8e8;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border-color: #ff6b39;
            color: #ff6b39;
        }

        .btn-primary {
            background: linear-gradient(145deg, #ff6b39, #e55a2e);
            border: 1px solid #f78c5a;
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, #ff8c5a, #ff6b39);
            box-shadow: 0 8px 25px rgba(255, 107, 57, 0.4);
            transform: translateY(-5px);
        }

        .decoration {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 57, 0.1) 0%, transparent 70%);
            z-index: 1;
        }

        .decoration:nth-child(1) {
            top: 10%;
            left: 10%;
            animation: float 6s ease-in-out infinite;
        }

        .decoration:nth-child(2) {
            bottom: 15%;
            right: 10%;
            animation: float 8s ease-in-out infinite reverse;
        }

        .decoration:nth-child(3) {
            top: 20%;
            right: 15%;
            animation: float 7s ease-in-out infinite 1s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .cube-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
            max-width: 200px;
            margin-left: auto;
            margin-right: auto;
        }

        .cube {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #262525, #1b1a1a);
            border: 1px solid #444343;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #ff6b39;
            animation: pulse 2s infinite;
        }

        .cube:nth-child(2n) {
            animation-delay: 0.5s;
        }

        .cube:nth-child(3n) {
            animation-delay: 1s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .footer {
            margin-top: 40px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 5rem;
            }
            
            .error-title {
                font-size: 2rem;
            }
            
            .error-content {
                padding: 30px 20px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="decoration"></div>
        <div class="decoration"></div>
        <div class="decoration"></div>

        <div class="error-content">
            <div class="cube-grid">
                <div class="cube"><i class="fas fa-cube"></i></div>
                <div class="cube"><i class="fas fa-question"></i></div>
                <div class="cube"><i class="fas fa-cube"></i></div>
                <div class="cube"><i class="fas fa-search"></i></div>
                <div class="cube"><i class="fas fa-times"></i></div>
                <div class="cube"><i class="fas fa-cube"></i></div>
                <div class="cube"><i class="fas fa-cube"></i></div>
                <div class="cube"><i class="fas fa-map-marker-alt"></i></div>
                <div class="cube"><i class="fas fa-cube"></i></div>
            </div>

            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-message">Shi, The page you're looking for seems to have disappeared. It might have been moved, deleted, or perhaps it never existed at all.</p>
            
            <div class="error-actions">

                <a href="/app/" class="btn btn-primary">
                    Go back
                </a>

            </div>

            <div class="footer">
                <p>Facet/Bloxd</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('mousemove', (e) => {
            const cubes = document.querySelectorAll('.cube');
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            
            cubes.forEach((cube, index) => {
                const speed = 0.05 * (index + 1);
                const xOffset = (mouseX - 0.5) * speed * 20;
                const yOffset = (mouseY - 0.5) * speed * 20;
                
                cube.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
